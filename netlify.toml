[build]
  # Using an external script for better reliability, caching, and debugging
  command = "bash netlify-build.sh"
  publish = "build/web"

[build.environment]
  # Ensuring the build environment uses the correct settings
  # Note: Ensure SUPABASE_URL and SUPABASE_ANON_KEY are set in Netlify UI
  FLUTTER_VERSION = "stable"

[[redirects]]
  # Essential for Flutter Web routing (SPAs)
  from = "/*"
  to = "/index.html"
  status = 200
